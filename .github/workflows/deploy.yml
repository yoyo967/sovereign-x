name: SOVEREIGN — Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  GCP_PROJECT: opus-magnum-ai
  REGION: us-central1
  ARTIFACT_REGISTRY: europe-west3-docker.pkg.dev/opus-magnum-ai/sovereign-repo

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Build & Deploy Backend
  # ─────────────────────────────────────────
  deploy-backend:
    name: Backend → Cloud Run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker europe-west3-docker.pkg.dev --quiet

      - name: Build & Push Backend Image
        working-directory: backend
        run: |
          docker build -t ${{ env.ARTIFACT_REGISTRY }}/sovereign-backend:${{ github.sha }} \
                       -t ${{ env.ARTIFACT_REGISTRY }}/sovereign-backend:latest .
          docker push ${{ env.ARTIFACT_REGISTRY }}/sovereign-backend:${{ github.sha }}
          docker push ${{ env.ARTIFACT_REGISTRY }}/sovereign-backend:latest

      - name: Deploy Backend to Cloud Run
        run: |
          gcloud run deploy sovereign-api \
            --image ${{ env.ARTIFACT_REGISTRY }}/sovereign-backend:${{ github.sha }} \
            --platform managed \
            --region ${{ env.REGION }} \
            --allow-unauthenticated \
            --port 8080 \
            --project ${{ env.GCP_PROJECT }} \
            --quiet

  # ─────────────────────────────────────────
  # JOB 2: Build & Deploy Frontend
  # ─────────────────────────────────────────
  deploy-frontend:
    name: Frontend → Cloud Run + Firebase
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker europe-west3-docker.pkg.dev --quiet

      - name: Build & Push Frontend Image
        working-directory: web
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }} \
            --build-arg NEXT_PUBLIC_FIREBASE_API_KEY=${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }} \
            --build-arg NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }} \
            --build-arg NEXT_PUBLIC_FIREBASE_PROJECT_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }} \
            --build-arg NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }} \
            --build-arg NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }} \
            --build-arg NEXT_PUBLIC_FIREBASE_APP_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }} \
            -t ${{ env.ARTIFACT_REGISTRY }}/sovereign-web:${{ github.sha }} \
            -t ${{ env.ARTIFACT_REGISTRY }}/sovereign-web:latest .
          docker push ${{ env.ARTIFACT_REGISTRY }}/sovereign-web:${{ github.sha }}
          docker push ${{ env.ARTIFACT_REGISTRY }}/sovereign-web:latest

      - name: Deploy Frontend to Cloud Run
        run: |
          gcloud run deploy sovereign-web \
            --image ${{ env.ARTIFACT_REGISTRY }}/sovereign-web:${{ github.sha }} \
            --platform managed \
            --region ${{ env.REGION }} \
            --allow-unauthenticated \
            --port 8080 \
            --project ${{ env.GCP_PROJECT }} \
            --quiet

      - name: Deploy Firebase Hosting
        working-directory: web
        run: |
          npm install -g firebase-tools
          firebase deploy --only hosting,firestore:rules \
            --project ${{ env.GCP_PROJECT }} \
            --token ${{ secrets.FIREBASE_TOKEN }}

  # ─────────────────────────────────────────
  # JOB 3: Smoke Tests (after both deployed)
  # ─────────────────────────────────────────
  smoke-tests:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend]
    steps:
      - name: Backend Health Check
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://sovereign-api-923137317598.us-central1.run.app/health)
          [ "$STATUS" = "200" ] || (echo "Backend health FAILED: $STATUS" && exit 1)

      - name: Frontend /de Check
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://opus-magnum-ai.web.app/de)
          [ "$STATUS" = "200" ] || (echo "Frontend /de FAILED: $STATUS" && exit 1)

      - name: Frontend /ar (RTL) Check
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://opus-magnum-ai.web.app/ar)
          [ "$STATUS" = "200" ] || (echo "Frontend /ar FAILED: $STATUS" && exit 1)

      - name: All checks passed
        run: echo "✅ All smoke tests passed. SOVEREIGN is live."
